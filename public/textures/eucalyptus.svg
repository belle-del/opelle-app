      <ellipse cx="-25" cy="60" rx="22" ry="16" transform="rotate(-20, -25, 60)"/>
      <ellipse cx="30" cy="70" rx="22" ry="16" transform="rotate(15, 30, 70)"/>
      <ellipse cx="-30" cy="140" rx="24" ry="17" transform="rotate(-25, -30, 140)"/>
      <ellipse cx="35" cy="155" rx="24" ry="17" transform="rotate(20, 35, 155)"/>
      <ellipse cx="-35" cy="230" rx="26" ry="18" transform="rotate(-15, -35, 230)"/>
      <ellipse cx="38" cy="248" rx="26" ry="18" transform="rotate(22, 38, 248)"/>
      <ellipse cx="-32" cy="325" rx="25" ry="17" transform="rotate(-28, -32, 325)"/>
      <ellipse cx="34" cy="340" rx="25" ry="17" transform="rotate(18, 34, 340)"/>
      <ellipse cx="-28" cy="420" rx="23" ry="16" transform="rotate(-20, -28, 420)"/>
      <ellipse cx="30" cy="438" rx="23" ry="16" transform="rotate(25, 30, 438)"/>
      <ellipse cx="-22" cy="510" rx="21" ry="15" transform="rotate(-22, -22, 510)"/>
      <ellipse cx="25" cy="525" rx="21" ry="15" transform="rotate(15, 25, 525)"/>
      <ellipse cx="-18" cy="600" rx="19" ry="14" transform="rotate(-18, -18, 600)"/>
      <ellipse cx="20" cy="615" rx="19" ry="14" transform="rotate(20, 20, 615)"/>
      <ellipse cx="-15" cy="685" rx="17" ry="13" transform="rotate(-25, -15, 685)"/>
      <ellipse cx="15" cy="698" rx="17" ry="13" transform="rotate(12, 15, 698)"/>
      <ellipse cx="-12" cy="755" rx="14" ry="11" transform="rotate(-15, -12, 755)"/>
    </g>

    <!-- Eucalyptus branch 2 - hanging from top center-right -->
    <g transform="translate(700, -10)">
      <path d="M0,0 C-5,50 -15,130 -20,230 C-25,330 -18,430 -8,540 C-2,610 5,680 15,750" stroke-width="2" fill="none"/>
      <ellipse cx="25" cy="55" rx="20" ry="15" transform="rotate(18, 25, 55)"/>
      <ellipse cx="-28" cy="65" rx="20" ry="15" transform="rotate(-15, -28, 65)"/>
      <ellipse cx="30" cy="145" rx="23" ry="16" transform="rotate(22, 30, 145)"/>
      <ellipse cx="-32" cy="158" rx="23" ry="16" transform="rotate(-20, -32, 158)"/>
      <ellipse cx="28" cy="240" rx="25" ry="17" transform="rotate(15, 28, 240)"/>
      <ellipse cx="-30" cy="255" rx="25" ry="17" transform="rotate(-25, -30, 255)"/>
      <ellipse cx="25" cy="338" rx="24" ry="16" transform="rotate(20, 25, 338)"/>
      <ellipse cx="-27" cy="350" rx="24" ry="16" transform="rotate(-18, -27, 350)"/>
      <ellipse cx="22" cy="432" rx="22" ry="15" transform="rotate(25, 22, 432)"/>
      <ellipse cx="-24" cy="445" rx="22" ry="15" transform="rotate(-22, -24, 445)"/>
      <ellipse cx="18" cy="522" rx="20" ry="14" transform="rotate(18, 18, 522)"/>
      <ellipse cx="-20" cy="535" rx="20" ry="14" transform="rotate(-15, -20, 535)"/>
      <ellipse cx="14" cy="608" rx="18" ry="13" transform="rotate(20, 14, 608)"/>
      <ellipse cx="-16" cy="620" rx="18" ry="13" transform="rotate(-20, -16, 620)"/>
      <ellipse cx="10" cy="690" rx="15" ry="12" transform="rotate(15, 10, 690)"/>
    </g>

    <!-- Eucalyptus branch 3 - smaller, hanging from top right -->
    <g transform="translate(1020, 20) scale(0.75)">
      <path d="M0,0 C8,55 18,135 20,235 C22,335 15,430 5,530 C-2,600 -10,660 -20,720" stroke-width="2.5" fill="none"/>
      <ellipse cx="-22" cy="65" rx="20" ry="15" transform="rotate(-18, -22, 65)"/>
      <ellipse cx="26" cy="78" rx="20" ry="15" transform="rotate(15, 26, 78)"/>
      <ellipse cx="-26" cy="155" rx="22" ry="16" transform="rotate(-22, -26, 155)"/>
      <ellipse cx="28" cy="170" rx="22" ry="16" transform="rotate(20, 28, 170)"/>
      <ellipse cx="-24" cy="250" rx="24" ry="17" transform="rotate(-15, -24, 250)"/>
      <ellipse cx="26" cy="265" rx="24" ry="17" transform="rotate(22, 26, 265)"/>
      <ellipse cx="-22" cy="345" rx="22" ry="16" transform="rotate(-20, -22, 345)"/>
      <ellipse cx="24" cy="358" rx="22" ry="16" transform="rotate(18, 24, 358)"/>
      <ellipse cx="-18" cy="435" rx="20" ry="14" transform="rotate(-25, -18, 435)"/>
      <ellipse cx="20" cy="448" rx="20" ry="14" transform="rotate(15, 20, 448)"/>
      <ellipse cx="-14" cy="520" rx="17" ry="13" transform="rotate(-18, -14, 520)"/>
      <ellipse cx="16" cy="532" rx="17" ry="13" transform="rotate(20, 16, 532)"/>
      <ellipse cx="-10" cy="600" rx="14" ry="11" transform="rotate(-15, -10, 600)"/>
    </g>

    <!-- Small accent branch - left side -->
    <g transform="translate(420, 40) scale(0.55)">
      <path d="M0,0 C5,45 12,110 15,190 C18,270 12,350 5,430" stroke-width="2.8" fill="none"/>
      <ellipse cx="-20" cy="50" rx="18" ry="13" transform="rotate(-20, -20, 50)"/>
      <ellipse cx="22" cy="62" rx="18" ry="13" transform="rotate(18, 22, 62)"/>
      <ellipse cx="-22" cy="130" rx="20" ry="14" transform="rotate(-15, -22, 130)"/>
      <ellipse cx="24" cy="145" rx="20" ry="14" transform="rotate(22, 24, 145)"/>
      <ellipse cx="-20" cy="215" rx="22" ry="15" transform="rotate(-22, -20, 215)"/>
      <ellipse cx="22" cy="230" rx="22" ry="15" transform="rotate(18, 22, 230)"/>
      <ellipse cx="-18" cy="300" rx="20" ry="14" transform="rotate(-18, -18, 300)"/>
      <ellipse cx="20" cy="312" rx="20" ry="14" transform="rotate(15, 20, 312)"/>
      <ellipse cx="-14" cy="378" rx="16" ry="12" transform="rotate(-20, -14, 378)"/>
