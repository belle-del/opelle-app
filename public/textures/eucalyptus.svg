<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" fill="none">
  <g stroke="#5C6148" fill="#5C6148" fill-opacity="0.1" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
