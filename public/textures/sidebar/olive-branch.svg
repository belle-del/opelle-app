<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 800" width="170" height="800">
  <rect width="170" height="800" fill="none"/>
  <!-- Olive tree with branches and small olives -->
  <g opacity="0.85">
    <!-- Main trunk -->
    <path d="M85 800 Q82 750 78 700 Q75 650 80 600 Q83 560 85 520 Q87 480 84 440 Q82 410 85 380"
          stroke="#7A8A6A" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Trunk texture lines -->
    <path d="M80 780 Q78 760 82 740" stroke="#8B9A7A" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M88 720 Q86 700 89 680" stroke="#8B9A7A" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M82 660 Q80 640 84 620" stroke="#8B9A7A" stroke-width="1.5" fill="none" opacity="0.5"/>

    <!-- Left main branch -->
    <path d="M80 520 Q60 500 40 480 Q25 465 15 445"
          stroke="#7A8A6A" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Left branch sub-branches -->
    <path d="M50 490 Q40 475 30 470" stroke="#7A8A6A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M35 478 Q25 465 18 462" stroke="#7A8A6A" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Right main branch -->
    <path d="M88 480 Q110 460 130 445 Q145 435 155 420"
          stroke="#7A8A6A" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Right branch sub-branches -->
    <path d="M120 452 Q135 440 145 435" stroke="#7A8A6A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M140 438 Q150 428 158 425" stroke="#7A8A6A" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Upper left branch -->
    <path d="M82 440 Q55 420 35 395 Q20 380 10 360"
          stroke="#7A8A6A" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M45 408 Q30 395 22 385" stroke="#7A8A6A" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Upper right branch -->
    <path d="M86 400 Q115 380 135 360 Q150 345 160 330"
          stroke="#7A8A6A" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- Olive leaves - left side -->
    <ellipse cx="20" cy="460" rx="12" ry="5" transform="rotate(-30 20 460)" fill="#8B9A7A" opacity="0.7"/>
    <ellipse cx="30" cy="465" rx="11" ry="4.5" transform="rotate(-45 30 465)" fill="#7A8A6A" opacity="0.8"/>
    <ellipse cx="15" cy="448" rx="10" ry="4" transform="rotate(-20 15 448)" fill="#8B9A7A" opacity="0.6"/>
    <ellipse cx="40" cy="475" rx="12" ry="5" transform="rotate(-35 40 475)" fill="#7A8A6A" opacity="0.7"/>
    <ellipse cx="25" cy="455" rx="11" ry="4.5" transform="rotate(-50 25 455)" fill="#8B9A7A" opacity="0.7"/>
    <ellipse cx="12" cy="440" rx="10" ry="4" transform="rotate(-15 12 440)" fill="#7A8A6A" opacity="0.6"/>

    <!-- Olive leaves - right side -->
    <ellipse cx="140" cy="440" rx="12" ry="5" transform="rotate(30 140 440)" fill="#8B9A7A" opacity="0.7"/>
    <ellipse cx="150" cy="430" rx="11" ry="4.5" transform="rotate(45 150 430)" fill="#7A8A6A" opacity="0.8"/>
    <ellipse cx="130" cy="448" rx="10" ry="4" transform="rotate(20 130 448)" fill="#8B9A7A" opacity="0.6"/>
    <ellipse cx="155" cy="422" rx="12" ry="5" transform="rotate(35 155 422)" fill="#7A8A6A" opacity="0.7"/>
    <ellipse cx="145" cy="435" rx="11" ry="4.5" transform="rotate(50 145 435)" fill="#8B9A7A" opacity="0.7"/>

    <!-- Upper leaves -->
    <ellipse cx="15" cy="365" rx="11" ry="4.5" transform="rotate(-25 15 365)" fill="#8B9A7A" opacity="0.7"/>
    <ellipse cx="25" cy="385" rx="10" ry="4" transform="rotate(-40 25 385)" fill="#7A8A6A" opacity="0.6"/>
    <ellipse cx="35" cy="398" rx="12" ry="5" transform="rotate(-30 35 398)" fill="#8B9A7A" opacity="0.7"/>
    <ellipse cx="150" cy="345" rx="11" ry="4.5" transform="rotate(25 150 345)" fill="#7A8A6A" opacity="0.7"/>
    <ellipse cx="140" cy="358" rx="10" ry="4" transform="rotate(40 140 358)" fill="#8B9A7A" opacity="0.6"/>
    <ellipse cx="155" cy="335" rx="12" ry="5" transform="rotate(30 155 335)" fill="#7A8A6A" opacity="0.7"/>

    <!-- Olives (small oval fruits) -->
    <ellipse cx="22" cy="470" rx="5" ry="6" fill="#7A8A6A" opacity="0.9"/>
    <ellipse cx="38" cy="482" rx="4.5" ry="5.5" fill="#8B9A7A" opacity="0.85"/>
    <ellipse cx="145" cy="442" rx="5" ry="6" fill="#7A8A6A" opacity="0.9"/>
    <ellipse cx="132" cy="455" rx="4.5" ry="5.5" fill="#8B9A7A" opacity="0.85"/>
    <ellipse cx="28" cy="392" rx="4" ry="5" fill="#7A8A6A" opacity="0.85"/>
    <ellipse cx="148" cy="350" rx="4" ry="5" fill="#8B9A7A" opacity="0.85"/>
    <ellipse cx="55" cy="495" rx="4.5" ry="5.5" fill="#7A8A6A" opacity="0.8"/>
    <ellipse cx="118" cy="458" rx="4" ry="5" fill="#8B9A7A" opacity="0.8"/>

    <!-- Olive highlights -->
    <ellipse cx="21" cy="468" rx="2" ry="2.5" fill="#8B9A7A" opacity="0.4"/>
    <ellipse cx="144" cy="440" rx="2" ry="2.5" fill="#8B9A7A" opacity="0.4"/>
  </g>

  <!-- Dev identification -->
  <text x="85" y="792" text-anchor="middle" font-family="monospace" font-size="8" fill="#7A8A6A" opacity="0.5">olive-branch</text>
</svg>