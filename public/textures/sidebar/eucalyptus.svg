    <circle cx="88" cy="480" r="8" fill="#8B9A7A" opacity="0.5" stroke="#7A8A6A" stroke-width="0.5"/>
    <circle cx="92" cy="458" r="7" fill="#7A8A6A" opacity="0.5" stroke="#8B9A7A" stroke-width="0.5"/>
    <circle cx="95" cy="438" r="7" fill="#8B9A7A" opacity="0.5" stroke="#7A8A6A" stroke-width="0.5"/>
    <circle cx="94" cy="420" r="6" fill="#7A8A6A" opacity="0.5" stroke="#8B9A7A" stroke-width="0.5"/>

    <!-- Upper branch leaves -->
    <circle cx="110" cy="435" r="8" fill="#8B9A7A" opacity="0.45" stroke="#7A8A6A" stroke-width="0.5"/>
    <circle cx="125" cy="430" r="7" fill="#7A8A6A" opacity="0.45" stroke="#8B9A7A" stroke-width="0.5"/>
    <circle cx="140" cy="428" r="7" fill="#8B9A7A" opacity="0.45" stroke="#7A8A6A" stroke-width="0.5"/>
    <circle cx="62" cy="460" r="8" fill="#7A8A6A" opacity="0.45" stroke="#8B9A7A" stroke-width="0.5"/>
    <circle cx="48" cy="454" r="7" fill="#8B9A7A" opacity="0.45" stroke="#7A8A6A" stroke-width="0.5"/>
    <circle cx="38" cy="452" r="6" fill="#7A8A6A" opacity="0.45" stroke="#8B9A7A" stroke-width="0.5"/>

