    <line x1="52" y1="738" x2="52" y2="758" stroke="#7A8A6A" stroke-width="0.5" opacity="0.3"/>
    <circle cx="65" cy="720" r="11" fill="#7A8A6A" opacity="0.55" stroke="#8B9A7A" stroke-width="0.5"/>
    <line x1="65" y1="710" x2="65" y2="730" stroke="#8B9A7A" stroke-width="0.5" opacity="0.3"/>
    <circle cx="58" cy="690" r="12" fill="#8B9A7A" opacity="0.5" stroke="#7A8A6A" stroke-width="0.5"/>
    <line x1="58" y1="680" x2="58" y2="700" stroke="#7A8A6A" stroke-width="0.5" opacity="0.3"/>
