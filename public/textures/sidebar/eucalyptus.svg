    <line x1="115" y1="591" x2="115" y2="609" stroke="#8B9A7A" stroke-width="0.5" opacity="0.3"/>
    <circle cx="132" cy="588" r="9" fill="#8B9A7A" opacity="0.5" stroke="#7A8A6A" stroke-width="0.5"/>
