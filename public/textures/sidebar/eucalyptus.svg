    <line x1="78" y1="572" x2="78" y2="588" stroke="#8B9A7A" stroke-width="0.5" opacity="0.3"/>
    <circle cx="85" cy="540" r="9" fill="#8B9A7A" opacity="0.5" stroke="#7A8A6A" stroke-width="0.5"/>
    <line x1="85" y1="532" x2="85" y2="548" stroke="#7A8A6A" stroke-width="0.5" opacity="0.3"/>
